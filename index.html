function parseMatPlantExcel(wb) {
  const ws = wb.Sheets[wb.SheetNames[0]];
  const data = XLSX.utils.sheet_to_json(ws, {header:1, defval:null});
  let plantName = null;
  let completedBy = null;
  const matData = {};
  for (let r = 0; r < Math.min(5, data.length); r++) {
    const row = data[r];
    if (row) {
      for (let c = 0; c < row.length; c++) {
        const v = String(row[c] || "").toLowerCase();
        if (v.includes("plant name")) { plantName = row[c+1] || row[c+2] || row[c+3]; for (let cc=c+1;cc<row.length;cc++) if(row[cc]) { plantName=row[cc]; break; } }
        if (v.includes("completed by")) { for (let cc=c+1;cc<row.length;cc++) if(row[cc]) { completedBy=row[cc]; break; } }
      }
    }
  }
  let headerRow = -1;
  for (let r = 0; r < Math.min(10, data.length); r++) {
    const row = data[r];
    if (row && row.some(c => String(c||"").includes("#")) && row.some(c => String(c||"").toLowerCase().includes("material"))) { headerRow = r; break; }
  }
  if (headerRow < 0) return { plantName, completedBy, matData };
  const hdr = data[headerRow];
  let colUsed=-1,colCrit=-1,colVis=-1,colLot=-1,colRisk=-1,colComment=-1,colNum=-1,colCat=-1,colExamples=-1;
  for (let c=0;c<hdr.length;c++) {
    const h=String(hdr[c]||"").toLowerCase().replace(/\n/g," ");
    if (h==="#" || h==="nr" || (h.length<4 && !isNaN(h))) colNum=c;
    if (h.includes("material category")) colCat=c;
    if (h.includes("typical examples") || h.includes("examples")) colExamples=c;
    if (h.includes("used on")) colUsed=c;
    if (h.includes("quality") && h.includes("critical")) colCrit=c;
    if (h.includes("visible")) colVis=c;
    if (h.includes("lot")) colLot=c;
    if (h.includes("risk")) colRisk=c;
    if (h.includes("comment") || h.includes("rationale")) colComment=c;
  }
  for (let r=headerRow+1; r<data.length; r++) {
    const row=data[r]; if(!row) continue;
    const num=row[colNum]; const cat=row[colCat>=0?colCat:1]; const ex=row[colExamples>=0?colExamples:2];
    if(!num && !cat && !ex) continue;
    const id=num||r-headerRow;
    const yn=v=>{const s=String(v||"").trim().toLowerCase();return s==="yes"?"Yes":s==="no"?"No":null;};
    matData[id]={
      used:yn(colUsed>=0?row[colUsed]:null),
      critical:yn(colCrit>=0?row[colCrit]:null),
      visible:yn(colVis>=0?row[colVis]:null),
      lotCtrl:yn(colLot>=0?row[colLot]:null),
      risk:colRisk>=0?row[colRisk]||null:null,
      comment:colComment>=0?row[colComment]||"":"",
      catName:cat||null,
      examples:ex||null
    };
  }
  return { plantName: plantName ? String(plantName).trim() : null, completedBy, matData };
}

function parseQCTestExcel(wb) {
  // Parse Plant_Identification tab
  const idSheet = wb.Sheets["Plant_Identification"];
  let plantName = null, completedBy = null, system = null, gpisAll = null, gpisLinked = null, altSystem = null;
  if (idSheet) {
    const idData = XLSX.utils.sheet_to_json(idSheet, {header:1, defval:null});
    for (let r = 0; r < idData.length; r++) {
      const row = idData[r]; if (!row) continue;
      for (let c = 0; c < row.length; c++) {
        const v = String(row[c] || "").toLowerCase();
        if (v.includes("plant name")) { for (let cc=c+1;cc<row.length;cc++) if(row[cc]) { plantName=String(row[cc]).trim(); break; } }
        if (v.includes("completed by")) { for (let cc=c+1;cc<row.length;cc++) if(row[cc]) { completedBy=String(row[cc]).trim(); break; } }
        if (v.includes("where are mirror") || (v.includes("q1") && v.includes("recorded"))) { for (let cc=c+1;cc<row.length;cc++) if(row[cc]) { system=String(row[cc]).trim(); break; } }
        if (v.includes("all mirror") || (v.includes("q2") && v.includes("gpis"))) { for (let cc=c+1;cc<row.length;cc++) if(row[cc]) { gpisAll=String(row[cc]).trim(); break; } }
        if (v.includes("linked") || (v.includes("q3") && v.includes("gpis"))) { for (let cc=c+1;cc<row.length;cc++) if(row[cc]) { gpisLinked=String(row[cc]).trim(); break; } }
        if (v.includes("not gpis") || (v.includes("q4") && v.includes("not"))) { for (let cc=c+1;cc<row.length;cc++) if(row[cc]) { altSystem=String(row[cc]).trim(); break; } }
      }
    }
  }
  // Parse QC_Test_Review tab
  const qcSheet = wb.Sheets["QC_Test_Review"];
  const tests = [];
  if (qcSheet) {
    const qcData = XLSX.utils.sheet_to_json(qcSheet, {header:1, defval:null});
    let headerRow = -1;
    for (let r = 0; r < Math.min(10, qcData.length); r++) {
      const row = qcData[r]; if (!row) continue;
      if (row.some(c => String(c||"") === "#") && row.some(c => String(c||"").toLowerCase().includes("qc test"))) { headerRow = r; break; }
    }
    if (headerRow >= 0) {
      const hdr = qcData[headerRow];
      let cNum=-1,cName=-1,cPurpose=-1,cType=-1,cPerf=-1,cFreq=-1,cTool=-1,cMode=-1,cWhere=-1,cComment=-1;
      for (let c=0;c<hdr.length;c++) {
        const h=String(hdr[c]||"").toLowerCase().replace(/\n/g," ");
        if (h==="#") cNum=c;
        if (h.includes("qc test")) cName=c;
        if (h.includes("purpose")) cPurpose=c;
        if (h.includes("test type")) cType=c;
        if (h.includes("performed")) cPerf=c;
        if (h.includes("frequency")) cFreq=c;
        if (h.includes("tool") || h.includes("measuring")) cTool=c;
        if (h.includes("manual") || h.includes("automatic")) cMode=c;
        if (h.includes("where") || h.includes("recorded")) cWhere=c;
        if (h.includes("comment")) cComment=c;
      }
      for (let r=headerRow+1; r<qcData.length; r++) {
        const row = qcData[r]; if (!row) continue;
        const num = cNum>=0 ? row[cNum] : null;
        const name = cName>=0 ? row[cName] : null;
        if (!num && !name) continue;
        if (String(name||"").toLowerCase().includes("summary") || String(name||"").toLowerCase().includes("other")) continue;
        const performed = cPerf>=0 ? String(row[cPerf]||"").toLowerCase() : "";
        const isPerformed = performed === "yes";
        const isNotPerformed = performed.includes("not");
        tests.push({
          num: num,
          name: String(name||"").trim(),
          purpose: cPurpose>=0 ? String(row[cPurpose]||"").trim() : "",
          type: cType>=0 ? String(row[cType]||"").trim() : "",
          performed: isPerformed ? "Yes" : (isNotPerformed ? "No" : "Unknown"),
          freq: cFreq>=0 ? String(row[cFreq]||"").trim() : "",
          tool: cTool>=0 ? String(row[cTool]||"").trim() : "",
          mode: cMode>=0 ? String(row[cMode]||"").trim() : "",
          where: cWhere>=0 ? String(row[cWhere]||"").trim() : "",
          comment: cComment>=0 ? String(row[cComment]||"").trim() : ""
        });
      }
    }
  }
  const pid = detectPlantId(plantName);
  return { plantName, completedBy, system, gpisAll, gpisLinked, altSystem, pid, tests };
}

// Match imported test name to TESTS array index
function matchTestIndex(importName, testsArr) {
  const ln = importName.toLowerCase().replace(/[^a-z0-9 ]/g,"").trim();
  const testNames = [
    ["chemical resistance","cass","120"],["silver adhesion"],["adhesion of paint","paint film"],
    ["reflectance"],["paint dry film","film thickness"],["nitric acid"],["hcl dip","10% hcl"],
    ["silver deposition"],["pendulum hardness"],["solvent rub"],["powder coverage"],
    ["branding ink rub"],["paint side inspection"],["face side inspection"],["edge grinding"],
    ["pinhole inspection","pinhole"],["speed cass","cass 1.5"],["branding code"],
    ["lite thickness"],["lite size","length & width","length"],["lite squareness","squareness"],
    ["condensation","hthh"],["p2 mirror","p2 miror","scanner"],["ferric"],["impact test"],
    ["flash light"],["sand blasting","sandblasting"],["resin thickness"],["paint weight"],
    ["uv roller"],["uv resin"],["ammonia"],["salt fog"],["paint hardner","paint hardness","sclerometer"]
  ];
  for (let i = 0; i < testNames.length && i < testsArr.length; i++) {
    if (testNames[i].some(kw => ln.includes(kw))) return i;
  }
  return -1;
}

function detectPlantId(plantName) {
  if (!plantName) return null;
  const n = plantName.toLowerCase();
  if (n.includes("gulfguard") || n.includes("ksa")) return "GG";
  if (n.includes("nongkhae") || n.includes("th)") || n.includes("thailand")) return "NK";
  if (n.includes("marqués") || n.includes("marques") || n.includes("mx)") || n.includes("mexico")) return "ELM";
  if (n.includes("tatui") || n.includes("br)") || n.includes("brazil")) return "TAT";
  if (n.includes("gujarat") || n.includes("ggl")) return null; // Exclude GGL
  return null;
}

function suggestWCOMapping(testName) {
  const lowerTest = testName.toLowerCase();
  const suggestions = WCO_CATALOG.map(w => {
    const lowerDesc = w.desc.toLowerCase();
    let score = 0;
    if (lowerTest.includes(lowerDesc) || lowerDesc.includes(lowerTest)) score = 100;
    else if (lowerTest.split(" ").some(word => lowerDesc.includes(word)) && lowerTest.length > 3) score = 80;
    return { ...w, score };
  }).filter(w => w.score > 0).sort((a, b) => b.score - a.score);
  return suggestions.length > 0 ? suggestions[0].code : null;
}

      let n = 1;
      while (existingCodes.includes("CUSTOM_" + String(n).padStart(3,"0"))) n++;
      code = "CUSTOM_" + String(n).padStart(3,"0");
    }
    if (existingCodes.includes(code)) { alert("Test code '" + code + "' already exists. Please choose a different code."); return; }
    const desc = (newCustom.desc || "").trim() || "(no description — please edit)";
    const tty = newCustom.tty || "Qualitative";
    const entry = {
      code: code, desc: desc, tty: tty, enabled: true, custom: true,
      expMax: newCustom.expMax === "" ? 0 : parseFloat(newCustom.expMax) || 0,
      expMin: newCustom.expMin === "" ? 0 : parseFloat(newCustom.expMin) || 0,
      target: newCustom.target === "" ? 0 : parseFloat(newCustom.target) || 0,
      dec: parseInt(newCustom.dec) || 0,
      uom: newCustom.uom || "",
      tst: tty === "Qualitative" ? (newCustom.tst || "PASS") : ""
    };
    setQiConfigs(prev => {
      const pc = getPlantCfg(prev, selectedPlant);
      const ts = getTests(prev, selectedPlant);
      return { ...prev, [selectedPlant]: { ...pc, tests: { ...ts, [code]: entry } } };
    });
    setNewCustom({ code:"", desc:"", tty:"Qualitative", expMax:"", expMin:"", target:"", dec:0, tst:"", uom:"" });
    setShowAddCustom(false);
  };

  // Remove/delete a test from a plant's config (works for both WCO_CATALOG and custom tests)
  const removeTestFromPlant = (plantId, wcoCode) => {
    if (!confirm("Remove test '" + wcoCode + "' from this plant's configuration?\n\n(You can restore built-in WCO tests by clicking 'Reset Plant' below.)")) return;
    setQiConfigs(prev => {
      const pc = getPlantCfg(prev, plantId);
      const ts = { ...getTests(prev, plantId) };
      // Mark as removed — filtering logic below hides rows where removed=true
      const existing = ts[wcoCode] || WCO_CATALOG.find(w => w.code === wcoCode) || { code: wcoCode };
      ts[wcoCode] = { ...existing, removed: true, enabled: false };
      return { ...prev, [plantId]: { ...pc, tests: ts } };
    });
  };

  const resetPlantConfig = (plantId) => {
    if (!confirm("Reset ALL WCO tests for this plant to defaults? This will un-remove deleted tests and revert all overrides.")) return;
    setQiConfigs(prev => { const n = {}; for (const k in prev) if (k !== plantId) n[k] = prev[k]; return n; });
  };

  const getExportData = () => {
    const qiRequestFreq = isPathA ? (qiFreqA[selectedPlant] || "TBD") : (qiFreqB[selectedPlant] || "TBD");
    if (isPathA) {
      return {
        plant: currentPlant.name,
        plantId: selectedPlant,
        path: "A (GPIS to M3)",
        qiRequestFrequency: qiRequestFreq,
        timestamp: new Date().toISOString(),
        tests: [{
          code: "WCO001",
          desc: "Wet Coater Glass GPIS Pass/Fail",
          tty: "2-Qualitative",
          enabled: true,
          result: generalTestResult[selectedPlant] || "PASS",
          target: 0, expMin: 0, expMax: 0
        }]
      };
    }
    const pc = qiConfigs[selectedPlant] || { path: "Full", tests: {} };
    const pcTests = pc.tests || {};
    const catalogTests = WCO_CATALOG
      .filter(wco => !(pcTests[wco.code] && pcTests[wco.code].removed))
      .map(wco => {
        const t = pcTests[wco.code] || {};
        const enabled = (t.enabled !== undefined) ? t.enabled : true;
        return {
          code: wco.code,
          desc: t.desc || wco.desc,
          tty: t.tty || wco.tty,
          enabled: enabled,
          expMax: (t.expMax !== undefined) ? t.expMax : wco.expMax,
          expMin: (t.expMin !== undefined) ? t.expMin : wco.expMin,
          target: (t.target !== undefined) ? t.target : wco.target,
          dec: (t.dec !== undefined) ? t.dec : wco.dec,
          uom: t.uom || wco.uom || "",
          tst: t.tst || wco.tst || "",
          source: "WCO Catalog"
        };
      });
    const customTests = Object.values(pcTests)
      .filter(t => t && t.custom && !t.removed && !WCO_CATALOG.find(w => w.code === t.code))
      .map(t => ({
        code: t.code,
        desc: t.desc,
        tty: t.tty,
        enabled: (t.enabled !== false),
        expMax: t.expMax || 0,
        expMin: t.expMin || 0,
        target: t.target || 0,
        dec: t.dec || 0,
        uom: t.uom || "",
        tst: t.tst || "",
        source: "Custom"
      }));
    const allTests = [...catalogTests, ...customTests];
    return { plant: currentPlant.name, plantId: selectedPlant, path: "B (Full M3 QI)", qiRequestFrequency: qiRequestFreq, timestamp: new Date().toISOString(), tests: allTests };
  };

  const downloadFile = (content, filename, mimeType) => {
    const blob = new Blob([content], { type: mimeType });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  };

  const exportJSON = () => {
    const data = getExportData();
    downloadFile(JSON.stringify(data, null, 2), "M3_QI_Config_" + selectedPlant + ".json", "application/json");
  };

  const exportCSV = () => {
    const data = getExportData();
    const header = "WCO Code,Description,Type,Enabled,Expected Max,Expected Min,Target,Decimals,UoM,Test Result";
    const rows = data.tests.map(t =>
      [t.code, '"'+t.desc+'"', t.tty, t.enabled?"Yes":"No", t.expMax, t.expMin, t.target, t.dec, t.uom, t.tst].join(",")
    );
    const csv = "Plant: " + data.plant + "\nPath: " + data.path + "\nQI Request Frequency: " + data.qiRequestFrequency + "\nDate: " + data.timestamp + "\n\n" + header + "\n" + rows.join("\n");
    downloadFile(csv, "M3_QI_Config_" + selectedPlant + ".csv", "text/csv");
  };

  const exportTSV = () => {
    const data = getExportData();
    const header = "WCO Code\tDescription\tType\tEnabled\tExpected Max\tExpected Min\tTarget\tDecimals\tUoM\tTest Result";
    const rows = data.tests.map(t =>
      [t.code, t.desc, t.tty, t.enabled?"Yes":"No", t.expMax, t.expMin, t.target, t.dec, t.uom, t.tst].join("\t")
    );
    const tsv = "QI Request Frequency: " + data.qiRequestFrequency + "\n\n" + header + "\n" + rows.join("\n");
    downloadFile(tsv, "M3_QI_Config_" + selectedPlant + ".xls", "application/vnd.ms-excel");
  };

  // Professional multi-sheet Excel export with full styling (colors, borders, badges, zebra rows)
  // Uses xlsx-js-style (SheetJS fork with styling support).
  const exportExcelPro = () => {
    const wb = XLSX.utils.book_new();
    const today = new Date().toISOString().slice(0,10);
    const plantName = currentPlant.name;
    const pcfg = qiConfigs[selectedPlant];
    const pcfgTests = (pcfg && pcfg.tests) ? pcfg.tests : {};

    // ── Brand palette (matches dashboard) ──
    const C = {
      navy:"1F4E79", blue:"2E75B6", green:"27AE60", yellow:"F39C12", red:"E74C3C",
      white:"FFFFFF", bgAlt:"FAFBFC", headerBg:"F1F5F9", border:"E2E8F0", borderSoft:"EEF2F7",
      qualBg:"E0E7FF", qualFg:"3730A3",
      quanBg:"DCFCE7", quanFg:"166534",
      numBg:"FEF3C7",  numFg:"92400E",
      passBg:"DCFCE7", passFg:"16A34A",
      failBg:"FEE2E2", failFg:"DC2626",
      infoBg:"EFF6FF", warnBg:"FFFBEB", mutedFg:"94A3B8"
    };
    const thin = (col) => ({ style:"thin", color:{rgb: col || C.border} });
    const med  = (col) => ({ style:"medium", color:{rgb: col || C.blue} });
    const borderAll = (col) => ({ top:thin(col), bottom:thin(col), left:thin(col), right:thin(col) });
    const s = {
      title:     { font:{ bold:true, sz:16, color:{rgb:C.white} }, fill:{ fgColor:{rgb:C.navy} }, alignment:{ horizontal:"left", vertical:"center", indent:1 }, border:borderAll(C.navy) },
      subtitle:  { font:{ bold:true, sz:11, color:{rgb:C.white} }, fill:{ fgColor:{rgb:C.blue} }, alignment:{ horizontal:"left", vertical:"center", indent:1 } },
      sectionHd: { font:{ bold:true, sz:12, color:{rgb:C.navy} }, fill:{ fgColor:{rgb:C.headerBg} }, alignment:{ horizontal:"left", vertical:"center", indent:1 }, border:{ bottom:med(C.blue) } },
      tableHdr:  { font:{ bold:true, sz:11, color:{rgb:C.navy} }, fill:{ fgColor:{rgb:C.headerBg} }, alignment:{ horizontal:"center", vertical:"center", wrapText:true }, border:{ top:thin(C.border), bottom:med(C.blue), left:thin(C.border), right:thin(C.border) } },
      tableHdrL: { font:{ bold:true, sz:11, color:{rgb:C.navy} }, fill:{ fgColor:{rgb:C.headerBg} }, alignment:{ horizontal:"left",   vertical:"center", wrapText:true, indent:1 }, border:{ top:thin(C.border), bottom:med(C.blue), left:thin(C.border), right:thin(C.border) } },
      kvKey:     { font:{ bold:true, sz:11, color:{rgb:"374151"} }, fill:{ fgColor:{rgb:C.headerBg} }, alignment:{ horizontal:"left", vertical:"center", indent:1 }, border:{ right:thin(C.border), bottom:thin(C.borderSoft) } },
      kvVal:     { font:{ sz:11, color:{rgb:"111827"} }, alignment:{ horizontal:"left", vertical:"center", indent:1 }, border:{ bottom:thin(C.borderSoft) } },
      cellEven:  { font:{ sz:10, color:{rgb:"111827"} }, fill:{ fgColor:{rgb:C.white} }, alignment:{ horizontal:"left", vertical:"center", wrapText:true, indent:1 }, border:borderAll(C.borderSoft) },
      cellOdd:   { font:{ sz:10, color:{rgb:"111827"} }, fill:{ fgColor:{rgb:C.bgAlt} }, alignment:{ horizontal:"left", vertical:"center", wrapText:true, indent:1 }, border:borderAll(C.borderSoft) },
      cellCenterEven: { font:{ sz:10, color:{rgb:"111827"} }, fill:{ fgColor:{rgb:C.white} }, alignment:{ horizontal:"center", vertical:"center" }, border:borderAll(C.borderSoft) },
      cellCenterOdd:  { font:{ sz:10, color:{rgb:"111827"} }, fill:{ fgColor:{rgb:C.bgAlt} }, alignment:{ horizontal:"center", vertical:"center" }, border:borderAll(C.borderSoft) },
      cellNumEven:    { font:{ sz:10, color:{rgb:"111827"} }, fill:{ fgColor:{rgb:C.white} }, alignment:{ horizontal:"right", vertical:"center", indent:1 }, border:borderAll(C.borderSoft) },
      cellNumOdd:     { font:{ sz:10, color:{rgb:"111827"} }, fill:{ fgColor:{rgb:C.bgAlt} }, alignment:{ horizontal:"right", vertical:"center", indent:1 }, border:borderAll(C.borderSoft) },
      cellMutedEven:  { font:{ sz:10, color:{rgb:C.mutedFg} }, fill:{ fgColor:{rgb:C.white} }, alignment:{ horizontal:"center", vertical:"center" }, border:borderAll(C.borderSoft) },
      cellMutedOdd:   { font:{ sz:10, color:{rgb:C.mutedFg} }, fill:{ fgColor:{rgb:C.bgAlt} }, alignment:{ horizontal:"center", vertical:"center" }, border:borderAll(C.borderSoft) },
      codeEven:  { font:{ bold:true, sz:10, color:{rgb:C.navy} }, fill:{ fgColor:{rgb:C.white} }, alignment:{ horizontal:"center", vertical:"center" }, border:borderAll(C.borderSoft) },
      codeOdd:   { font:{ bold:true, sz:10, color:{rgb:C.navy} }, fill:{ fgColor:{rgb:C.bgAlt} }, alignment:{ horizontal:"center", vertical:"center" }, border:borderAll(C.borderSoft) },
      badgeQual: { font:{ bold:true, sz:9, color:{rgb:C.qualFg} }, fill:{ fgColor:{rgb:C.qualBg} }, alignment:{ horizontal:"center", vertical:"center" }, border:borderAll(C.qualFg) },
      badgeQuan: { font:{ bold:true, sz:9, color:{rgb:C.quanFg} }, fill:{ fgColor:{rgb:C.quanBg} }, alignment:{ horizontal:"center", vertical:"center" }, border:borderAll(C.quanFg) },
      badgeNum:  { font:{ bold:true, sz:9, color:{rgb:C.numFg}  }, fill:{ fgColor:{rgb:C.numBg}  }, alignment:{ horizontal:"center", vertical:"center" }, border:borderAll(C.numFg) },
      pass:      { font:{ bold:true, sz:10, color:{rgb:C.passFg} }, fill:{ fgColor:{rgb:C.passBg} }, alignment:{ horizontal:"center", vertical:"center" }, border:borderAll(C.passFg) },
      fail:      { font:{ bold:true, sz:10, color:{rgb:C.failFg} }, fill:{ fgColor:{rgb:C.failBg} }, alignment:{ horizontal:"center", vertical:"center" }, border:borderAll(C.failFg) },
      yesCell:   { font:{ bold:true, sz:10, color:{rgb:C.passFg} }, fill:{ fgColor:{rgb:C.passBg} }, alignment:{ horizontal:"center", vertical:"center" }, border:borderAll(C.borderSoft) },
      noCell:    { font:{ bold:true, sz:10, color:{rgb:C.failFg} }, fill:{ fgColor:{rgb:C.failBg} }, alignment:{ horizontal:"center", vertical:"center" }, border:borderAll(C.borderSoft) },
      riskHigh:  { font:{ bold:true, sz:10, color:{rgb:C.failFg} }, fill:{ fgColor:{rgb:C.failBg} }, alignment:{ horizontal:"center", vertical:"center" }, border:borderAll(C.borderSoft) },
      riskMed:   { font:{ bold:true, sz:10, color:{rgb:"92400E"}  }, fill:{ fgColor:{rgb:C.numBg}  }, alignment:{ horizontal:"center", vertical:"center" }, border:borderAll(C.borderSoft) },
      riskLow:   { font:{ bold:true, sz:10, color:{rgb:C.passFg} }, fill:{ fgColor:{rgb:C.passBg} }, alignment:{ horizontal:"center", vertical:"center" }, border:borderAll(C.borderSoft) },
      note:      { font:{ italic:true, sz:9, color:{rgb:"6B7280"} }, alignment:{ horizontal:"left", vertical:"center", indent:1 } },
      footerBar: { font:{ italic:true, sz:9, color:{rgb:"9CA3AF"} }, fill:{ fgColor:{rgb:C.white} }, alignment:{ horizontal:"right", vertical:"center", indent:1 }, border:{ top:thin(C.border) } }
    };

    const setCell = (ws, r, c, value, style) => {
      const addr = XLSX.utils.encode_cell({r, c});
      const cell = ws[addr] || {};
      cell.v = value;
      cell.t = typeof value === "number" ? "n" : "s";
      if (style) cell.s = style;
      ws[addr] = cell;
    };
    const applyStyle = (ws, r, c, style) => {
      const addr = XLSX.utils.encode_cell({r, c});
      if (!ws[addr]) ws[addr] = { t:"s", v:"" };
      ws[addr].s = style;
    };
    const setRow = (ws, r, height) => { ws["!rows"] = ws["!rows"] || []; ws["!rows"][r] = { hpt: height }; };
    const setColWidths = (ws, widths) => { ws["!cols"] = widths.map(w => ({wch: w})); };
    const setMerges = (ws, merges) => { ws["!merges"] = (ws["!merges"]||[]).concat(merges); };
    const growRange = (ws, r, c) => {
      const cur = ws["!ref"] ? XLSX.utils.decode_range(ws["!ref"]) : { s:{r:0,c:0}, e:{r:0,c:0} };
      if (r > cur.e.r) cur.e.r = r;
      if (c > cur.e.c) cur.e.c = c;
      ws["!ref"] = XLSX.utils.encode_range(cur);
    };

    // Factory: create a standardized sheet with title banner + subtitle banner + optional KV summary
    const makeBanner = (ws, title, subtitle, colSpan) => {
      setCell(ws, 0, 0, title, s.title);
      for (let c = 1; c < colSpan; c++) applyStyle(ws, 0, c, s.title);
      setMerges(ws, [{s:{r:0,c:0}, e:{r:0, c:colSpan-1}}]);
      setRow(ws, 0, 32);
      setCell(ws, 1, 0, subtitle, s.subtitle);
      for (let c = 1; c < colSpan; c++) applyStyle(ws, 1, c, s.subtitle);
      setMerges(ws, [{s:{r:1,c:0}, e:{r:1, c:colSpan-1}}]);
      setRow(ws, 1, 22);
      growRange(ws, 1, colSpan-1);
    };

    const typeStyle = (tty) => tty==="Qualitative" ? s.badgeQual : tty==="Quantitative" ? s.badgeQuan : tty==="Numeric" ? s.badgeNum : null;
    const riskStyle = (r) => r==="High" ? s.riskHigh : r==="Medium" ? s.riskMed : r==="Low" ? s.riskLow : null;

    // ╔══════════════════════════════════════════════════╗
    // ║  SHEET 1: COVER / SUMMARY                        ║
    // ╚══════════════════════════════════════════════════╝
    const wsCover = {};
    makeBanner(wsCover, "GlobalCore M3 — Mirror / Wet Coater Readiness", "QI Configuration Export  ·  " + plantName + "  ·  " + today, 4);
    setColWidths(wsCover, [28, 40, 20, 26]);

    const pathLabel = isPathA ? "Path A (GPIS → M3 WCO001 PASS/FAIL)" : "Path B (Full M3 QI Request)";
    const qiFreq = isPathA ? (qiFreqA[selectedPlant]||"TBD") : (qiFreqB[selectedPlant]||"TBD");

    // Plant Info block (rows 3-9)
    const info = [
      ["Plant",           plantName,                        "Region",             currentPlant.region],
      ["Plant ID",        selectedPlant,                    "Status",             currentPlant.status],
      ["System",          currentPlant.system,              "GPIS Used",          currentPlant.gpisUsed],
      ["Integration Path", pathLabel,                       "QI Request Freq.",   qiFreq],
      ["Data Owner",      "Robert Skowron — Global Quality SME", "Dashboard Ver.", "v" + DASHBOARD_VERSION],
      ["Export Date",     today,                            "Date Received",      currentPlant.dateReceived || "—"]
    ];
    let r = 3;
    setCell(wsCover, 2, 0, "Plant Information", s.sectionHd);
    for (let c=1;c<4;c++) applyStyle(wsCover, 2, c, s.sectionHd);
    setMerges(wsCover, [{s:{r:2,c:0},e:{r:2,c:3}}]);
    setRow(wsCover, 2, 22);
    info.forEach(row => {
      setCell(wsCover, r, 0, row[0], s.kvKey);
      setCell(wsCover, r, 1, row[1], s.kvVal);
      setCell(wsCover, r, 2, row[2], s.kvKey);
      setCell(wsCover, r, 3, row[3], s.kvVal);
      setRow(wsCover, r, 20);
      r++;
    });

    // Configuration Summary block
    r++;
    setCell(wsCover, r, 0, "Configuration Summary", s.sectionHd);
    for (let c=1;c<4;c++) applyStyle(wsCover, r, c, s.sectionHd);
    setMerges(wsCover, [{s:{r:r,c:0},e:{r:r,c:3}}]);
    setRow(wsCover, r, 22);
    r++;

    if (isPathA) {
      const result = generalTestResult[selectedPlant] || "PASS";
      setCell(wsCover, r, 0, "WCO001 Current Result", s.kvKey);
      setCell(wsCover, r, 1, result, result === "PASS" ? s.pass : s.fail);
      setCell(wsCover, r, 2, "Test Type", s.kvKey);
      setCell(wsCover, r, 3, "2-Qualitative", s.badgeQual);
      setRow(wsCover, r, 22);
    } else {
      const catalogVisible = WCO_CATALOG.filter(w => !(pcfgTests[w.code] && pcfgTests[w.code].removed));
      const customTests = Object.values(pcfgTests).filter(t => t && t.custom && !t.removed);
      const enabled = catalogVisible.filter(w => { const t = pcfgTests[w.code]; return !t || t.enabled !== false; });
      const stats = [
        ["Built-in WCO Tests", catalogVisible.length + " visible / " + WCO_CATALOG.length + " total", "Enabled Tests", String(enabled.length)],
        ["Custom Tests Added", String(customTests.length), "Removed Tests", String(WCO_CATALOG.length - catalogVisible.length)]
      ];
      stats.forEach(row => {
        setCell(wsCover, r, 0, row[0], s.kvKey);
        setCell(wsCover, r, 1, row[1], s.kvVal);
        setCell(wsCover, r, 2, row[2], s.kvKey);
        setCell(wsCover, r, 3, row[3], s.kvVal);
        setRow(wsCover, r, 20);
        r++;
      });
    }
    r += 2;
    setCell(wsCover, r, 0, "Report auto-generated from M3 Readiness Dashboard v" + DASHBOARD_VERSION + "  ·  " + new Date().toLocaleString(), s.footerBar);
    for (let c=1;c<4;c++) applyStyle(wsCover, r, c, s.footerBar);
    setMerges(wsCover, [{s:{r:r,c:0},e:{r:r,c:3}}]);
    growRange(wsCover, r, 3);
    XLSX.utils.book_append_sheet(wb, wsCover, "Summary");

    // ╔══════════════════════════════════════════════════╗
    // ║  SHEET 2: QI CONFIG (Path A or Path B)           ║
    // ╚══════════════════════════════════════════════════╝
    if (isPathA) {
      const ws = {};
      const cols = ["WCO Code","Description","Type","Expected Max","Expected Min","Target","Decimals","UoM","Current Result"];
      const colSpan = cols.length;
      makeBanner(ws, "Path A — GPIS to M3 WCO001 PASS/FAIL", "QI Request Frequency: " + qiFreq, colSpan);
      setColWidths(ws, [14, 40, 16, 14, 14, 10, 10, 10, 16]);
      const hdrRow = 2;
      cols.forEach((h, c) => setCell(ws, hdrRow, c, h, s.tableHdr));
      setRow(ws, hdrRow, 28);
      const dataRow = hdrRow + 1;
      const result = generalTestResult[selectedPlant] || "PASS";
      setCell(ws, dataRow, 0, "WCO001", s.codeEven);
      setCell(ws, dataRow, 1, "Wet Coater Glass GPIS Pass/Fail", s.cellEven);
      setCell(ws, dataRow, 2, "Qualitative", s.badgeQual);
      setCell(ws, dataRow, 3, "—", s.cellMutedEven);
      setCell(ws, dataRow, 4, "—", s.cellMutedEven);
      setCell(ws, dataRow, 5, "—", s.cellMutedEven);
      setCell(ws, dataRow, 6, "—", s.cellMutedEven);
      setCell(ws, dataRow, 7, "—", s.cellMutedEven);
      setCell(ws, dataRow, 8, result, result === "PASS" ? s.pass : s.fail);
      setRow(ws, dataRow, 24);
      growRange(ws, dataRow, colSpan-1);
      ws["!autofilter"] = { ref: XLSX.utils.encode_range({s:{r:hdrRow,c:0}, e:{r:dataRow,c:colSpan-1}}) };
      ws["!freeze"] = { xSplit:0, ySplit:hdrRow+1 };
      XLSX.utils.book_append_sheet(wb, ws, "QI Config Path A");
    } else {
      const ws = {};
      const cols = ["#","WCO Code","Description","Type","Enabled","Max","Min","Target","Dec","UoM","Result","Source"];
      const colSpan = cols.length;
      makeBanner(ws, "Path B — Full M3 QI Request (" + plantName + ")", "QI Request Frequency: " + qiFreq, colSpan);
      setColWidths(ws, [5, 14, 40, 15, 10, 12, 12, 12, 8, 10, 12, 14]);

      const hdrRow = 2;
      cols.forEach((h, c) => setCell(ws, hdrRow, c, h, c===2 ? s.tableHdrL : s.tableHdr));
      setRow(ws, hdrRow, 32);

      const allRows = [];
      WCO_CATALOG.forEach(w => { if (!(pcfgTests[w.code] && pcfgTests[w.code].removed)) allRows.push(w); });
      Object.values(pcfgTests).forEach(t => { if (t && t.custom && !t.removed && !WCO_CATALOG.find(w => w.code === t.code)) allRows.push(t); });

      allRows.forEach((w, i) => {
        const rowIdx = hdrRow + 1 + i;
        const isEven = i % 2 === 0;
        const cell = isEven ? s.cellEven : s.cellOdd;
        const cellC = isEven ? s.cellCenterEven : s.cellCenterOdd;
        const cellN = isEven ? s.cellNumEven : s.cellNumOdd;
        const cellM = isEven ? s.cellMutedEven : s.cellMutedOdd;
        const code = isEven ? s.codeEven : s.codeOdd;
        const t = pcfgTests[w.code] || {};
        const tty = t.tty || w.tty;
        const isQ = tty === "Qualitative";
        const enabled = t.enabled !== false;
        setCell(ws, rowIdx, 0, i+1, cellC);
        setCell(ws, rowIdx, 1, w.code, code);
        setCell(ws, rowIdx, 2, t.desc || w.desc, cell);
        setCell(ws, rowIdx, 3, tty, typeStyle(tty) || cellC);
        setCell(ws, rowIdx, 4, enabled ? "Yes" : "No", enabled ? s.yesCell : s.noCell);
        if (isQ) {
          setCell(ws, rowIdx, 5, "—", cellM);
          setCell(ws, rowIdx, 6, "—", cellM);
          setCell(ws, rowIdx, 7, "—", cellM);
          setCell(ws, rowIdx, 8, "—", cellM);
          setCell(ws, rowIdx, 9, "—", cellM);
          const res = t.tst || w.tst || "PASS";
          setCell(ws, rowIdx, 10, res, res === "PASS" ? s.pass : s.fail);
        } else {
          setCell(ws, rowIdx, 5, (t.expMax !== undefined ? t.expMax : w.expMax), cellN);
          setCell(ws, rowIdx, 6, (t.expMin !== undefined ? t.expMin : w.expMin), cellN);
          setCell(ws, rowIdx, 7, (t.target !== undefined ? t.target : w.target), cellN);
          setCell(ws, rowIdx, 8, (t.dec !== undefined ? t.dec : w.dec), cellC);
          setCell(ws, rowIdx, 9, (t.uom || w.uom || ""), cellC);
          setCell(ws, rowIdx, 10, "—", cellM);
        }
        setCell(ws, rowIdx, 11, w.custom ? "Custom" : "WCO Catalog", w.custom ? { ...cellC, font:{ bold:true, sz:10, color:{rgb:C.numFg}}, fill:{ fgColor:{rgb:C.warnBg}} } : cellC);
        setRow(ws, rowIdx, 22);
      });
      const lastRow = hdrRow + allRows.length;
      growRange(ws, lastRow, colSpan-1);
      ws["!autofilter"] = { ref: XLSX.utils.encode_range({s:{r:hdrRow,c:0}, e:{r:lastRow, c:colSpan-1}}) };
      ws["!freeze"] = { xSplit:2, ySplit:hdrRow+1 };
      XLSX.utils.book_append_sheet(wb, ws, "QI Config Path B");
    }

    // ╔══════════════════════════════════════════════════╗
    // ║  SHEET 3: QC TESTS (current plant only)          ║
    // ╚══════════════════════════════════════════════════╝
    {
      const ws = {};
      const cols = ["#","QC Test","Purpose","Test Type","Status","Frequency","Tool","Mode","Recorded In"];
      const colSpan = cols.length;
      makeBanner(ws, "QC Tests — " + plantName, TESTS.filter(t => t[selectedPlant] && t[selectedPlant].s === 3).length + " performed  ·  " + TESTS.filter(t => t[selectedPlant] && t[selectedPlant].s === 1).length + " not performed", colSpan);
      setColWidths(ws, [5, 36, 32, 14, 14, 22, 22, 12, 14]);
      const hdrRow = 2;
      cols.forEach((h, c) => setCell(ws, hdrRow, c, h, c<=3 ? s.tableHdrL : s.tableHdr));
      setRow(ws, hdrRow, 28);
      let ri = hdrRow + 1;
      TESTS.forEach((t, idx) => {
        const d = t[selectedPlant] || {};
        if (d.s === undefined) return;
        const isEven = (ri - hdrRow - 1) % 2 === 0;
        const cell = isEven ? s.cellEven : s.cellOdd;
        const cellC = isEven ? s.cellCenterEven : s.cellCenterOdd;
        const statusStr = d.s === 3 ? "Performed" : d.s === 1 ? "Not Performed" : "N/A";
        const statusStyle = d.s === 3 ? s.yesCell : d.s === 1 ? s.noCell : { ...cellC, font:{sz:10,color:{rgb:C.mutedFg}} };
        setCell(ws, ri, 0, idx+1, cellC);
        setCell(ws, ri, 1, t.full || t.name, cell);
        setCell(ws, ri, 2, t.purpose, cell);
        setCell(ws, ri, 3, t.type, cell);
        setCell(ws, ri, 4, statusStr, statusStyle);
        setCell(ws, ri, 5, d.f || "—", cell);
        setCell(ws, ri, 6, d.t || "—", cell);
        setCell(ws, ri, 7, d.m || "—", cellC);
        setCell(ws, ri, 8, d.w || "—", cellC);
        setRow(ws, ri, 22);
        ri++;
      });
      const lastRow = ri - 1;
      growRange(ws, lastRow, colSpan-1);
      ws["!autofilter"] = { ref: XLSX.utils.encode_range({s:{r:hdrRow,c:0}, e:{r:lastRow, c:colSpan-1}}) };
      ws["!freeze"] = { xSplit:0, ySplit:hdrRow+1 };
      XLSX.utils.book_append_sheet(wb, ws, "QC Tests");
    }

    // ╔══════════════════════════════════════════════════╗
    // ║  SHEET 4: RAW MATERIALS (current plant only)     ║
    // ╚══════════════════════════════════════════════════╝
    {
      const ws = {};
      const cols = ["#","Material Category","Typical Examples","Used on Line?","Quality Critical?","Visible in M3?","Lot-Controlled?","Risk Level","Comments"];
      const colSpan = cols.length;
      const pd = matPlantData[selectedPlant] || {};
      const hasData = Object.keys(pd).length > 0;
      const subtitle = hasData ? "Data received — " + (matUploadLog.find(l => l.id === selectedPlant)?.by || "plant") : "Awaiting plant response";
      makeBanner(ws, "Raw Materials — " + plantName, subtitle, colSpan);
      setColWidths(ws, [5, 28, 32, 14, 16, 14, 14, 12, 40]);
      const hdrRow = 2;
      cols.forEach((h, c) => setCell(ws, hdrRow, c, h, c<=2 ? s.tableHdrL : s.tableHdr));
      setRow(ws, hdrRow, 32);
      const allMats = [...MATERIALS, ...Object.entries(matExtraMaterials)
        .filter(([id]) => !MATERIALS.find(m => m.id == id))
        .map(([id,d]) => ({id:parseInt(id),cat:d.cat,examples:d.examples,note:d.note}))];
      let ri = hdrRow + 1;
      allMats.forEach((m, i) => {
        const d = pd[m.id] || {};
        const isEven = i % 2 === 0;
        const cell = isEven ? s.cellEven : s.cellOdd;
        const cellC = isEven ? s.cellCenterEven : s.cellCenterOdd;
        const cellM = isEven ? s.cellMutedEven : s.cellMutedOdd;
        const ynStyle = v => v === "Yes" ? s.yesCell : v === "No" ? s.noCell : cellM;
        setCell(ws, ri, 0, m.id, cellC);
        setCell(ws, ri, 1, m.cat, cell);
        setCell(ws, ri, 2, m.examples, cell);
        setCell(ws, ri, 3, d.used || "—", ynStyle(d.used));
        setCell(ws, ri, 4, d.critical || "—", ynStyle(d.critical));
        setCell(ws, ri, 5, d.visible || "—", ynStyle(d.visible));
        setCell(ws, ri, 6, d.lotCtrl || "—", ynStyle(d.lotCtrl));
        setCell(ws, ri, 7, d.risk || "—", riskStyle(d.risk) || cellM);
        setCell(ws, ri, 8, d.comment || m.note || "", cell);
        setRow(ws, ri, 22);
        ri++;
      });
      const lastRow = ri - 1;
      growRange(ws, lastRow, colSpan-1);
      ws["!autofilter"] = { ref: XLSX.utils.encode_range({s:{r:hdrRow,c:0}, e:{r:lastRow, c:colSpan-1}}) };
      ws["!freeze"] = { xSplit:0, ySplit:hdrRow+1 };
      XLSX.utils.book_append_sheet(wb, ws, "Raw Materials");
    }

    // ╔══════════════════════════════════════════════════╗
    // ║  SHEET 5: RM QI TESTS (if any)                   ║
    // ╚══════════════════════════════════════════════════╝
    if (rmTests.length > 0) {
      const ws = {};
      const cols = ["#","Code","Description","Material","Type","Result","Max","Min","Target","Dec","UoM","Freq","Note"];
      const colSpan = cols.length;
      makeBanner(ws, "Raw Material QI Tests — " + plantName, rmTests.length + " test(s) defined", colSpan);
      setColWidths(ws, [5, 12, 30, 20, 14, 12, 10, 10, 10, 8, 10, 8, 32]);
      const hdrRow = 2;
      cols.forEach((h, c) => setCell(ws, hdrRow, c, h, c<=3 ? s.tableHdrL : s.tableHdr));
      setRow(ws, hdrRow, 28);
      rmTests.forEach((t, i) => {
        const ri = hdrRow + 1 + i;
        const isEven = i % 2 === 0;
        const cell = isEven ? s.cellEven : s.cellOdd;
        const cellC = isEven ? s.cellCenterEven : s.cellCenterOdd;
        const cellN = isEven ? s.cellNumEven : s.cellNumOdd;
        const cellM = isEven ? s.cellMutedEven : s.cellMutedOdd;
        const code = isEven ? s.codeEven : s.codeOdd;
        const isQ = t.tty === "Qualitative";
        setCell(ws, ri, 0, i+1, cellC);
        setCell(ws, ri, 1, t.code, code);
        setCell(ws, ri, 2, t.desc, cell);
        setCell(ws, ri, 3, t.material||"", cell);
        setCell(ws, ri, 4, t.tty||"", typeStyle(t.tty) || cellC);
        if (isQ) {
          const res = t.tst || "PASS";
          setCell(ws, ri, 5, res, res === "PASS" ? s.pass : s.fail);
          for (let c=6;c<=10;c++) setCell(ws, ri, c, "—", cellM);
        } else {
          setCell(ws, ri, 5, "—", cellM);
          setCell(ws, ri, 6, t.expMax, cellN);
          setCell(ws, ri, 7, t.expMin, cellN);
          setCell(ws, ri, 8, t.target, cellN);
          setCell(ws, ri, 9, t.dec, cellC);
          setCell(ws, ri, 10, t.uom||"—", cellC);
        }
        setCell(ws, ri, 11, t.freq, cellC);
        setCell(ws, ri, 12, t.note||"", cell);
        setRow(ws, ri, 22);
      });
      const lastRow = hdrRow + rmTests.length;
      growRange(ws, lastRow, colSpan-1);
      ws["!autofilter"] = { ref: XLSX.utils.encode_range({s:{r:hdrRow,c:0}, e:{r:lastRow, c:colSpan-1}}) };
      ws["!freeze"] = { xSplit:2, ySplit:hdrRow+1 };
      XLSX.utils.book_append_sheet(wb, ws, "RM QI Tests");
    }

    // Write & download — per-plant file
    const filename = "M3_QI_Config_" + selectedPlant + "_" + today + ".xlsx";
    XLSX.writeFile(wb, filename);
  };

  // ============ FULL STATE EXPORT / IMPORT (for GitHub Pages sharing) ============
  const exportFullState = () => {
    const state = {
      version: DASHBOARD_VERSION,
      exportedAt: new Date().toISOString(),
      exportedBy: "Dashboard user",
      note: "Full dashboard state export — import this file into another instance of the dashboard to sync.",
      qiConfigs,
      pathOverrides,
      generalTestResult,
      qiFreqA,
      qiFreqB,
      matPlantData,
      matUploadLog,
      matExtraMaterials,
      rmTests,
      qcImports,
      qcImportLog
    };
    const today = new Date().toISOString().slice(0,10);
    downloadFile(JSON.stringify(state, null, 2), "M3_Dashboard_State_" + today + ".json", "application/json");
  };

  const importFullState = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const state = JSON.parse(e.target.result);
        if (!state.version) throw new Error("Not a valid dashboard state file");
        if (!confirm("Import full dashboard state from " + (state.exportedAt || "file") + "?\n\nThis will OVERWRITE your current edits (QI Configs, Results, Raw Materials, RM Tests, etc.).")) return;
        if (state.qiConfigs) setQiConfigs(state.qiConfigs);
        if (state.pathOverrides) setPathOverrides(state.pathOverrides);
        if (state.generalTestResult) setGeneralTestResult(state.generalTestResult);
        if (state.qiFreqA) setQiFreqA(state.qiFreqA);
        if (state.qiFreqB) setQiFreqB(state.qiFreqB);
        if (state.matPlantData) setMatPlantData(state.matPlantData);
        if (state.matUploadLog) setMatUploadLog(state.matUploadLog);
        if (state.matExtraMaterials) setMatExtraMaterials(state.matExtraMaterials);
        if (state.rmTests) setRmTests(state.rmTests);
        if (state.qcImports) setQcImports(state.qcImports);
        if (state.qcImportLog) setQcImportLog(state.qcImportLog);
        alert("✅ Dashboard state imported successfully from " + (state.exportedAt || "file") + ".");
      } catch (err) { alert("❌ Error importing state: " + err.message); }
    };
    reader.readAsText(file);
  };

  const btn=(l,v,cur,light)=>{return{padding:"8px 18px",borderRadius:8,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,
    background:cur===v?(light?"#fff":NAVY):(light?"rgba(255,255,255,0.15)":"#E2E8F0"),
    color:cur===v?(light?NAVY:"#fff"):(light?"#fff":"#555"),transition:"all .2s"}};

  return (
    <div style={{padding:24,minHeight:"100vh"}}>
      <div style={{maxWidth:1280,margin:"0 auto"}}>
        <div style={{background:`linear-gradient(135deg,${NAVY} 0%,${BLUE} 100%)`,borderRadius:16,padding:"28px 36px",marginBottom:24,color:"#fff"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
            <div>
              <h1 style={{fontSize:24,fontWeight:700,margin:0}}>GlobalCore M3 - Mirror/Wet Coater Readiness Dashboard</h1>
              <p style={{opacity:.8,fontSize:13,marginTop:4}}>Real QC Data · Robert Skowron, Global Quality SME · {received}/4 Plants Confirmed · {TESTS.length} Tests · GGL Excluded · Updated: 2026-04-01</p>
            </div>
            <div style={{display:"flex",gap:8}}>
              {[["overview","Overview"],["heatmap","QC Heatmap"],["details","Frequency Detail"],["gaps","Gap Analysis"],["paths","M3 Paths"],["qi","M3 QI Config"],["rmqi","RM QI Config"],["materials","Raw Materials"]].map(([v,l])=>(
                <button key={v} onClick={()=>{setView(v);setShowImportPanel(false);setShowVersionInfo(false);}} style={btn(l,v,view,true)}>{l}</button>
              ))}
            </div>
          </div>
        </div>

        
        {/* VERSION & DATA FRESHNESS BANNER — hidden on Raw Materials tab (has own upload) */}
        {view !== "materials" && (
        <div style={{background:"#fff",borderRadius:12,padding:"12px 20px",marginBottom:14,boxShadow:"0 1px 4px rgba(0,0,0,.06)",
          display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10,border:"1px solid #E2E8F0"}}>
          <div style={{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
            <span style={{fontSize:12,fontWeight:700,color:NAVY,padding:"4px 12px",borderRadius:8,background:"#EFF6FF"}}>v{DASHBOARD_VERSION}</span>
            <span style={{fontSize:12,color:"#555"}}>Data built: <strong>{DATA_BUILT}</strong></span>
            <span style={{fontSize:11,color:"#888"}}>|</span>
            <span style={{fontSize:12,color:received===4?GREEN:YELLOW,fontWeight:600}}>{received}/4 plants hardcoded</span>
            {qcImportLog.length > 0 && <span style={{fontSize:11,padding:"3px 10px",borderRadius:8,background:"#FEF3C7",color:"#92400E",fontWeight:600}}>+{qcImportLog.length} runtime import(s)</span>}
          </div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>setShowImportPanel(!showImportPanel)} style={{padding:"6px 14px",borderRadius:8,border:"2px solid "+BLUE,background:showImportPanel?BLUE:"#fff",color:showImportPanel?"#fff":BLUE,fontSize:12,fontWeight:700,cursor:"pointer"}}>
              {"\uD83D\uDCC2"} Import Data
            </button>
            <button onClick={()=>setShowVersionInfo(!showVersionInfo)} style={{padding:"6px 14px",borderRadius:8,border:"2px solid "+NAVY,background:showVersionInfo?NAVY:"#fff",color:showVersionInfo?"#fff":NAVY,fontSize:12,fontWeight:700,cursor:"pointer"}}>
              {"\u2139\uFE0F"} Version Info
            </button>
          </div>
        </div>
        )}

        {/* VERSION INFO PANEL */}
        {showVersionInfo && view !== "materials" && (
          <div style={{background:"#fff",borderRadius:12,padding:20,marginBottom:14,boxShadow:"0 1px 4px rgba(0,0,0,.06)",border:"2px solid "+NAVY}}>
            <div style={{fontWeight:700,fontSize:14,color:NAVY,marginBottom:12}}>Dashboard Version History</div>
            {CHANGELOG.map((c,i) => (
              <div key={i} style={{padding:"10px 0",borderBottom:i<CHANGELOG.length-1?"1px solid #F1F5F9":"none",display:"flex",gap:14,alignItems:"flex-start"}}>
                <span style={{fontWeight:700,fontSize:12,color:"#fff",background:i===0?GREEN:"#94A3B8",padding:"3px 10px",borderRadius:8,whiteSpace:"nowrap"}}>v{c.ver}</span>
                <div>
                  <span style={{fontSize:12,fontWeight:600,color:"#555"}}>{c.date}</span>
                  <p style={{fontSize:12,color:"#666",margin:"4px 0 0"}}>{c.note}</p>
                </div>
              </div>
            ))}
            <div style={{marginTop:14,padding:12,background:"#FFF8E1",borderRadius:8,fontSize:12,color:"#666",lineHeight:1.6}}>
              <strong style={{color:"#92400E"}}>{"\u26A0\uFE0F"} Freshness notice:</strong> This HTML contains data frozen at build time ({DATA_BUILT}).
              If you received this file and need newer data, ask the dashboard owner for the latest version or use the Import button above to load new Excel files at runtime.
            </div>
          </div>
        )}

        {/* DATA IMPORT PANEL */}
        {showImportPanel && view !== "materials" && (
          <div style={{background:"#fff",borderRadius:12,padding:20,marginBottom:14,boxShadow:"0 1px 4px rgba(0,0,0,.06)",border:"2px solid "+BLUE}}>
            <div style={{fontWeight:700,fontSize:14,color:BLUE,marginBottom:4}}>Import QC Test Data from Excel</div>
            <p style={{fontSize:12,color:"#666",marginBottom:16}}>
              Drop a completed <strong>Mirror_QC_Plant_Request_Form</strong> file here. The parser reads Plant_Identification and QC_Test_Review tabs, detects the plant, and overlays the data on the dashboard in real-time. This does not modify the HTML file itself — it is a runtime overlay.
            </p>
            <div onDragOver={(e)=>{e.preventDefault();setQcDragOver(true);}} onDragLeave={()=>setQcDragOver(false)}
              onDrop={(e)=>{e.preventDefault();setQcDragOver(false);const f=e.dataTransfer.files;if(f.length)handleQCFile(f[0]);}}
              style={{border:"3px dashed "+(qcDragOver?BLUE:"#CBD5E1"),borderRadius:16,padding:"24px",textAlign:"center",
                background:qcDragOver?"#EFF6FF":"#FAFBFC",transition:"all .2s",cursor:"pointer",marginBottom:16}}
              onClick={()=>{const inp=document.createElement("input");inp.type="file";inp.accept=".xlsx,.xls";inp.onchange=(e)=>{if(e.target.files[0])handleQCFile(e.target.files[0]);};inp.click();}}>
              <div style={{fontSize:32,marginBottom:6}}>{qcDragOver?"\uD83D\uDCC2":"\uD83D\uDCC1"}</div>
              <div style={{fontWeight:700,fontSize:14,color:NAVY}}>Drop QC Test Form (.xlsx) here or click to browse</div>
              <div style={{fontSize:11,color:"#888",marginTop:4}}>Accepts: Mirror_QC_Plant_Request_Form_v2 files for GG, NK, ELM, TAT</div>
            </div>
            {qcImportLog.length > 0 && (
              <div>
                <div style={{fontWeight:700,fontSize:12,color:"#555",marginBottom:8}}>Runtime Imports:</div>
                {qcImportLog.map((l,i) => (
                  <div key={i} style={{display:"flex",gap:12,alignItems:"center",padding:"8px 12px",background:i%2===0?"#F8FAFC":"#fff",borderRadius:8,marginBottom:4}}>
                    <span style={{fontSize:16}}>{"\u2705"}</span>
                    <div style={{flex:1}}>
                      <span style={{fontWeight:700,fontSize:12,color:NAVY}}>{l.plant} ({l.id})</span>
                      <span style={{fontSize:11,color:"#888",marginLeft:8}}>{l.testsPerformed} tests performed</span>
                    </div>
                    <span style={{fontSize:11,color:"#999"}}>{l.file} · {l.date}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))",gap:14,marginBottom:24}}>
          {[
            {label:"Plants in Scope",value:4,color:NAVY,sub:"excl. GGL Gujarat"},
            {label:"Data Received",value:received,color:GREEN,sub:`${received}/4 plants confirmed`},
            {label:"Overdue",value:overdue,color:RED,sub:"pending response"},
            {label:"Total QC Tests",value:TESTS.length,color:BLUE,sub:"unique tests"},
            {label:"Aligned (3+)",value:stats.aligned,color:GREEN,sub:`${stats.aligned}/${stats.total} tests`},
            {label:"Divergent",value:stats.divergent,color:YELLOW,sub:"mixed coverage"},
            {label:"Total Gaps",value:stats.totalGaps,color:RED,sub:"test not done at plant"},
          ].map((c,i)=>(
            <div key={i} style={{background:"#fff",borderRadius:12,padding:"18px 20px",borderLeft:`4px solid ${c.color}`,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
              <div style={{fontSize:10,color:"#888",fontWeight:700,textTransform:"uppercase",letterSpacing:.5}}>{c.label}</div>
              <div style={{fontSize:32,fontWeight:800,color:c.color,margin:"2px 0"}}>{c.value}</div>
              <div style={{fontSize:11,color:"#999"}}>{c.sub}</div>
            </div>
          ))}
        </div>

        {view==="overview"&&(<>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginBottom:24}}>
            <div style={{background:"#fff",borderRadius:12,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
              <div style={{background:NAVY,color:"#fff",padding:"12px 20px",fontWeight:700,fontSize:14}}>Plant Response Status</div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead><tr style={{background:"#F1F5F9"}}>
                  {["Plant","System","GPIS?","Status"].map(h=><th key={h} style={{padding:"10px 14px",textAlign:"left",fontWeight:600,color:"#555",borderBottom:"2px solid #E2E8F0"}}>{h}</th>)}
                </tr></thead>
                <tbody>{PLANTS.map(p=>(
                  <tr key={p.id} style={{borderBottom:"1px solid #F1F5F9"}}>
                    <td style={{padding:"10px 14px"}}><strong>{p.name}</strong><br/><span style={{fontSize:11,color:"#888"}}>{p.region}</span></td>
                    <td style={{padding:"10px 14px",fontSize:12}}>{p.system}</td>
                    <td style={{padding:"10px 14px"}}><span style={{color:p.gpisUsed==="Yes"?GREEN:p.gpisUsed==="No"?RED:"#999",fontWeight:600}}>{p.gpisUsed}</span></td>
                    <td style={{padding:"10px 14px"}}><span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"3px 10px",borderRadius:16,fontSize:11,fontWeight:700,
                      background:p.status==="received"?"#DEF7EC":p.status==="pending"?"#FFF8E1":"#FDECEA",color:statusColor(p.status)}}>
                      {statusIcon(p.status)} {p.status}</span></td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
            <div style={{background:"#fff",borderRadius:12,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
              <div style={{background:NAVY,color:"#fff",padding:"12px 20px",fontWeight:700,fontSize:14}}>Tests Performed per Plant</div>
              <div style={{padding:20}}>
                {[{name:"GulfGuard (KSA)",perf:stats.ggP,color:"#3B82F6"},{name:"Nongkhae (TH)",perf:stats.nkP,color:"#8B5CF6"},{name:"El Marqués (MX)",perf:stats.elmP,color:"#F59E0B"},{name:"Tatui (BR)",perf:stats.tatP,color:"#10B981"}]
                  .map((p,i)=>(
                  <div key={i} style={{marginBottom:16}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:13,fontWeight:600,marginBottom:4}}>
                      <span>{p.name}</span><span style={{color:p.color}}>{p.perf}/{stats.total}</span>
                    </div>
                    <div style={{height:10,background:"#E2E8F0",borderRadius:5,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${(p.perf/stats.total)*100}%`,background:p.color,borderRadius:5}}/>
                    </div>
                  </div>
                ))}

                    <div style={{padding:24}}>

                            <tbody>
                              <tr style={{borderBottom:"1px solid #E2E8F0"}}>

                                <td style={{padding:"12px 16px",fontWeight:700,color:"#555"}}>Description</td>

                              <tr style={{borderBottom:"1px solid #E2E8F0"}}>
                                <td style={{padding:"12px 16px",fontWeight:700,color:"#555"}}>Type</td>

                                <td style={{padding:"12px 16px",fontWeight:700,color:"#555"}}>Target / Min / Max</td>
                                <td style={{padding:"12px 16px",color:"#999"}}>0 / 0 / 0 (not used for qualitative)</td>

                                    <option value="PASS">PASS</option>
                                    <option value="FAIL">FAIL</option>
                                  </select>
                                </td>

                            </tbody>
                          </table>
                        </div>
                        <div style={{flex:"0 0 auto",textAlign:"center",padding:20}}>
                          <div style={{width:120,height:120,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,fontWeight:900,
                            background:((generalTestResult[selectedPlant] || "PASS") === "PASS") ? "#D1FAE5" : "#FEE2E2",
                            color:((generalTestResult[selectedPlant] || "PASS") === "PASS") ? "#065F46" : "#991B1B",
                            border:"4px solid "+(((generalTestResult[selectedPlant] || "PASS") === "PASS") ? GREEN : "#DC2626")}}>
                            {(generalTestResult[selectedPlant] || "PASS") === "PASS" ? "✓" : "✗"}
                          </div>
                          <div style={{marginTop:8,fontWeight:700,fontSize:14,color:((generalTestResult[selectedPlant] || "PASS") === "PASS") ? GREEN : "#DC2626"}}>
                            {generalTestResult[selectedPlant] || "PASS"}
                          </div>
                        </div>
                      </div>
                      <div style={{marginTop:16,padding:12,background:"#F0F9FF",borderRadius:8,fontSize:12,color:"#555",lineHeight:1.5}}>
                        <strong>How it works:</strong> GPIS performs all individual quality checks internally. The result sent to M3 is a single WCO001 test (2-Qualitative) with a binary PASS/FAIL outcome. Target, Min, Max values are 0.
                      </div>
                    </div>
                  </div>
                </div>
              )}

              {/* PATH B — Full WCO Test Table */}
              {!isPathA && (()=>{

                const catalogRows = WCO_CATALOG
                  .filter(w => !(pcfgTests[w.code] && pcfgTests[w.code].removed))

                const customRows = Object.values(pcfgTests).filter(t =>

                      <th style={{padding:"10px",textAlign:"center",fontWeight:600,width:50}}></th>

                  </thead>

                    {rows.map((wco,i) => {
                      const testConfig = pcfgTests[wco.code] || null;
                      const isEnabled = testConfig ? (testConfig.enabled !== false) : true;
                      const gv = (field) => {
                        const t = testConfig;
                        if (t && t[field] !== undefined && t[field] !== null && t[field] !== "") return t[field];
                        return wco[field] !== undefined ? wco[field] : null;
                      };
                      const currentType = (testConfig && testConfig.tty) || wco.tty;
                      const isQual = currentType === "Qualitative";
                      const numDisabled = !isEnabled || isQual;
                      const currentDesc = (testConfig && testConfig.desc) || wco.desc;
                      return (
                        <tr key={wco.code} style={{borderBottom:"1px solid #F1F5F9",background:wco.custom?"#FFFBEB":(i%2===0?"#fff":"#FAFBFC"),opacity:isEnabled?1:0.5}}>

                          <td style={{padding:"6px 8px"}}>
                            <input type="text" value={currentDesc||""} onChange={(e)=>updateTestValue(selectedPlant,wco.code,"desc",e.target.value)} disabled={!isEnabled}

                          <td style={{padding:"6px 8px",textAlign:"center"}}>
                            <select value={currentType} onChange={(e)=>updateTestValue(selectedPlant,wco.code,"tty",e.target.value)} disabled={!isEnabled}
                              style={{padding:"4px 6px",borderRadius:6,fontSize:10,fontWeight:700,cursor:isEnabled?"pointer":"not-allowed",
                              background:wcoTypeColor[currentType]||"#F1F5F9",color:wcoTypeColorDark[currentType]||"#555",border:"1px solid "+(wcoTypeColorDark[currentType]||"#CBD5E1")}}>
                              <option value="Qualitative">Qualitative</option>
                              <option value="Quantitative">Quantitative</option>
                              <option value="Numeric">Numeric</option>
                            </select>
                          </td>
                          <td style={{padding:"6px 8px"}}><input type="number" step="0.01" value={numDisabled?"":(gv("expMax")||"")} onChange={(e) => updateTestValue(selectedPlant,wco.code,"expMax",e.target.value)} disabled={numDisabled} placeholder={isQual?"N/A":""} style={{width:"100%",minWidth:70,padding:"6px 8px",border:"1px solid #D1D5DB",borderRadius:4,fontSize:13,textAlign:"right",background:numDisabled?"#F1F5F9":"#fff",color:numDisabled?"#94A3B8":"#111"}}/></td>

                          <td style={{padding:"6px 8px"}}><input type="number" step="0.01" value={numDisabled?"":(gv("target")||"")} onChange={(e) => updateTestValue(selectedPlant,wco.code,"target",e.target.value)} disabled={numDisabled} placeholder={isQual?"N/A":""} style={{width:"100%",minWidth:70,padding:"6px 8px",border:"1px solid #D1D5DB",borderRadius:4,fontSize:13,textAlign:"right",background:numDisabled?"#F1F5F9":"#fff",color:numDisabled?"#94A3B8":"#111"}}/></td>
                          <td style={{padding:"6px 8px"}}><input type="number" min="0" max="5" value={numDisabled?"":(gv("dec")||0)} onChange={(e) => updateTestValue(selectedPlant,wco.code,"dec",e.target.value)} disabled={numDisabled} style={{width:"100%",minWidth:50,padding:"6px 8px",border:"1px solid #D1D5DB",borderRadius:4,fontSize:13,textAlign:"center",background:numDisabled?"#F1F5F9":"#fff",color:numDisabled?"#94A3B8":"#111"}}/></td>
                          <td style={{padding:"6px 8px"}}><input type="text" value={numDisabled?"":(gv("uom")||"")} onChange={(e) => updateTestValue(selectedPlant,wco.code,"uom",e.target.value)} disabled={numDisabled} placeholder={isQual?"—":""} style={{width:"100%",minWidth:50,padding:"6px 8px",border:"1px solid #D1D5DB",borderRadius:4,fontSize:13,textAlign:"center",background:numDisabled?"#F1F5F9":"#fff",color:numDisabled?"#94A3B8":"#111"}}/></td>

                      <tr><td colSpan={11} style={{padding:"24px",textAlign:"center",color:"#999",fontSize:12}}>

                      </td></tr>

                  </tbody>
                </table>
              </div>
                );})()}

              {/* Add Custom Test — only for Path B */}
              {!isPathA && (
              <div style={{marginBottom:20}}>
                <button onClick={() => setShowAddCustom(!showAddCustom)} style={{padding:"10px 16px",background:BLUE,color:"#fff",border:"none",borderRadius:8,fontWeight:700,cursor:"pointer"}}>
                  {showAddCustom ? "Cancel" : "+ Add Custom Test"}
                </button>
              </div>
              )}

              {/* Add Custom Test Form — only for Path B */}
              {!isPathA && showAddCustom && (
                <div style={{marginBottom:24,padding:16,background:"#FFF8E1",borderRadius:10,borderLeft:"4px solid "+YELLOW}}>
                  <div style={{fontWeight:700,fontSize:13,marginBottom:4,color:YELLOW}}>Add Custom Test</div>

                    <div style={{gridColumn:"span 2"}}>

                        <option>Quantitative</option>
                        <option>Numeric</option>
                      </select>
                    </div>
                    {newCustom.tty === "Qualitative" ? (
                      <div>

                          <option value="FAIL">FAIL</option>
                        </select>
                      </div>

                      <div>
                        <label style={{display:"block",fontSize:10,fontWeight:700,color:"#92400E",marginBottom:3}}>Max</label>
                        <input type="number" step="0.01" placeholder="optional" value={newCustom.expMax} onChange={(e) => setNewCustom({...newCustom,expMax:e.target.value})} style={{width:"100%"}}/>
                      </div>
                      <div>
                        <label style={{display:"block",fontSize:10,fontWeight:700,color:"#92400E",marginBottom:3}}>Min</label>
                        <input type="number" step="0.01" placeholder="optional" value={newCustom.expMin} onChange={(e) => setNewCustom({...newCustom,expMin:e.target.value})} style={{width:"100%"}}/>
                      </div>
                      <div>
                        <label style={{display:"block",fontSize:10,fontWeight:700,color:"#92400E",marginBottom:3}}>Target</label>
                        <input type="number" step="0.01" placeholder="optional" value={newCustom.target} onChange={(e) => setNewCustom({...newCustom,target:e.target.value})} style={{width:"100%"}}/>
                      </div>
                      <div>
                        <label style={{display:"block",fontSize:10,fontWeight:700,color:"#92400E",marginBottom:3}}>Decimals</label>
                        <input type="number" min="0" max="5" placeholder="0" value={newCustom.dec} onChange={(e) => setNewCustom({...newCustom,dec:e.target.value})} style={{width:"100%"}}/>
                      </div>
                      <div>
                        <label style={{display:"block",fontSize:10,fontWeight:700,color:"#92400E",marginBottom:3}}>UoM</label>
                        <input type="text" placeholder="e.g. ML, %" value={newCustom.uom} onChange={(e) => setNewCustom({...newCustom,uom:e.target.value})} style={{width:"100%"}}/>
                      </div>
                    </>)}
                  </div>

                      Cancel
                    </button>
                    <button onClick={()=>resetPlantConfig(selectedPlant)} title="Restore all default WCO tests and clear overrides for this plant"
                      style={{marginLeft:"auto",padding:"10px 14px",background:"#fff",color:"#475569",border:"1px solid #CBD5E1",borderRadius:8,fontWeight:600,cursor:"pointer",fontSize:12}}>
                      ↻ Reset Plant Config
                    </button>
                  </div>
                </div>
              )}

              {/* Configuration Summary */}
              <div style={{padding:16,background:"#F8FAFC",borderRadius:10,borderLeft:"4px solid "+NAVY}}>
                <div style={{fontWeight:700,fontSize:13,color:NAVY,marginBottom:8}}>Configuration Summary</div>
                <div style={{fontSize:12,color:"#666",lineHeight:1.6}}>
                  <strong>Plant:</strong> {currentPlant.name}<br/>
                  <strong>Integration Path:</strong> {isPathA ? "Path A (GPIS → M3 WCO001)" : "Path B (Full QI with WCO Tests)"}<br/>
                  <strong>QI Request Frequency:</strong> {isPathA ? (qiFreqA[selectedPlant] || "TBD") : (qiFreqB[selectedPlant] || "TBD")}<br/>
                  {isPathA
                    ? <span><strong>WCO001 Result:</strong> {generalTestResult[selectedPlant] || "PASS"}<br/></span>
                    : <span><strong>Tests Enabled:</strong> {WCO_CATALOG.filter(function(wco) { var pc = qiConfigs[selectedPlant]; var t = (pc && pc.tests) ? pc.tests[wco.code] : null; return t ? t.enabled : true; }).length} / {WCO_CATALOG.length}<br/>
                      <strong>Custom Tests:</strong> {Object.values((qiConfigs[selectedPlant] && qiConfigs[selectedPlant].tests) || {}).filter(function(t) { return !WCO_CATALOG.find(function(w) { return w.code === t.code; }); }).length}<br/></span>
                  }
                </div>
                <div style={{marginTop:12,display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                  <span style={{fontSize:11,color:"#666",fontWeight:600,marginRight:4}}>Export this plant's QI Config:</span>
                  <button onClick={exportExcelPro} style={{padding:"8px 14px",background:GREEN,color:"#fff",border:"none",borderRadius:6,fontWeight:700,cursor:"pointer",fontSize:12}} title="Multi-sheet professional Excel (Summary + QI Config + QC Tests + Raw Materials + RM Tests + All Plants)">
                    📊 Excel (.xlsx) Pro
                  </button>
                  <button onClick={exportJSON} style={{padding:"8px 14px",background:NAVY,color:"#fff",border:"none",borderRadius:6,fontWeight:600,cursor:"pointer",fontSize:12}}>
                    JSON
                  </button>
                  <button onClick={exportCSV} style={{padding:"8px 14px",background:BLUE,color:"#fff",border:"none",borderRadius:6,fontWeight:600,cursor:"pointer",fontSize:12}}>
                    CSV
                  </button>
                  <button onClick={exportTSV} style={{padding:"8px 14px",background:"#64748B",color:"#fff",border:"none",borderRadius:6,fontWeight:600,cursor:"pointer",fontSize:12}}>
                    Legacy .xls
                  </button>
                </div>
                {/* Share & Sync — Full State Export/Import */}
                <div style={{marginTop:16,padding:12,background:"#EFF6FF",borderRadius:8,borderLeft:"4px solid "+BLUE}}>
                  <div style={{fontWeight:700,fontSize:12,color:BLUE,marginBottom:4}}>🔄 Share & Sync (Full Dashboard State)</div>
                  <div style={{fontSize:11,color:"#555",marginBottom:8}}>
                    Export the complete dashboard state (all plants, all edits) to share with colleagues. They can Import the file to see your changes. Works offline — no GitHub account or tokens required.
                  </div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    <button onClick={exportFullState} style={{padding:"8px 14px",background:BLUE,color:"#fff",border:"none",borderRadius:6,fontWeight:600,cursor:"pointer",fontSize:12}}>
                      ⬇ Export Full State (JSON)
                    </button>
                    <button onClick={()=>{const inp=document.createElement("input");inp.type="file";inp.accept=".json";inp.onchange=(e)=>{if(e.target.files[0])importFullState(e.target.files[0]);};inp.click();}}
                      style={{padding:"8px 14px",background:"#fff",color:BLUE,border:"2px solid "+BLUE,borderRadius:6,fontWeight:600,cursor:"pointer",fontSize:12}}>
                      ⬆ Import Full State (JSON)
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        )}

        {view==="rmqi"&&(
          <div style={{background:"#fff",borderRadius:12,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
            <div style={{background:"linear-gradient(135deg, #7C3AED 0%, #4F46E5 100%)",color:"#fff",padding:"20px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
              <div>
                <span style={{fontWeight:700,fontSize:16}}>Raw Materials — M3 QI Configuration</span>
                <p style={{opacity:.8,fontSize:12,marginTop:4}}>Define QI test characteristics for raw material quality control. All tests are created from scratch here.</p>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <span style={{fontSize:12,fontWeight:700,color:"#E0E7FF",padding:"6px 14px",borderRadius:8,background:"rgba(255,255,255,0.15)"}}>{rmTests.length} test(s) defined</span>
              </div>
            </div>
            <div style={{padding:20}}>

              {/* Plant Selector for RM too */}
              <div style={{marginBottom:20,padding:14,background:"#F8FAFC",borderRadius:10}}>
                <label style={{fontWeight:700,fontSize:13,color:"#333",marginRight:12}}>Plant context:</label>
                <select value={selectedPlant} onChange={(e) => setSelectedPlant(e.target.value)} style={{padding:"8px 12px",borderRadius:6,border:"1px solid #D1D5DB",fontSize:13}}>
                  {PLANTS.map(p => <option key={p.id} value={p.id}>{p.name} ({p.id})</option>)}
                </select>
              </div>

              {/* RM Tests Table */}

                      </td>
                      <td style={{padding:"4px 6px",textAlign:"center",background:"#FDFBFF"}}>
                        <span style={{fontSize:9,fontWeight:600,color:cLot.color,background:cLot.bg,padding:"2px 5px",borderRadius:6,whiteSpace:"nowrap"}}>{cLot.label.replace(/[✅⚠️] /g,"")}</span>
                      </td>
                    </tr>);
                  })}
                </tbody>
              </table>
            </div>
            <div style={{padding:"12px 20px",borderTop:"1px solid #E2E8F0",display:"flex",gap:16,fontSize:11,color:"#666",flexWrap:"wrap",alignItems:"center"}}>
              <span style={{display:"inline-flex",alignItems:"center",gap:4}}><span style={{width:12,height:12,borderRadius:3,background:"#DCFCE7",border:"1px solid #16A34A",display:"inline-block"}}/> Yes</span>
              <span style={{display:"inline-flex",alignItems:"center",gap:4}}><span style={{width:12,height:12,borderRadius:3,background:"#FEE2E2",border:"1px solid #DC2626",display:"inline-block"}}/> No</span>
              <span style={{display:"inline-flex",alignItems:"center",gap:4}}><span style={{width:12,height:12,borderRadius:3,background:"#F1F5F9",border:"1px solid #CBD5E1",display:"inline-block"}}/> Pending</span>
              <span style={{marginLeft:16,fontWeight:700,color:"#DC2626",fontSize:10,padding:"2px 8px",borderRadius:8,background:"#FEE2E2"}}>High Risk</span>
              <span style={{fontWeight:700,color:"#D97706",fontSize:10,padding:"2px 8px",borderRadius:8,background:"#FEF3C7"}}>Medium Risk</span>
              <span style={{fontWeight:700,color:"#16A34A",fontSize:10,padding:"2px 8px",borderRadius:8,background:"#DCFCE7"}}>Low Risk</span>
              <span style={{marginLeft:"auto",fontStyle:"italic",color:"#999"}}>Hover cells for plant comments</span>
            </div>
          </div>
          <div style={{background:"#fff",borderRadius:12,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,.06)",marginBottom:24}}>
            <div style={{background:BLUE,color:"#fff",padding:"14px 20px",fontWeight:700,fontSize:14}}>
              {"📋"} Tatui (BR) — Detailed Response (André Chieus & Laura Lourenço)
            </div>
            <div style={{padding:20}}>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(340px,1fr))",gap:14}}>
                {allMats.filter(m => TATUI_DATA[m.id] && TATUI_DATA[m.id].used === "Yes").map(mat => {
                  const d = TATUI_DATA[mat.id];
                  return (<div key={mat.id} style={{border:"1px solid #E2E8F0",borderRadius:10,padding:"14px 16px",borderLeft:"4px solid "+riskColor(d.risk)}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                      <div>
                        <span style={{fontWeight:700,fontSize:13,color:"#333"}}>{mat.cat}</span>
                        {mat.plantSpecific && <span style={{fontSize:9,marginLeft:6,padding:"1px 6px",borderRadius:8,background:"#FEF3C7",color:"#92400E"}}>Plant-specific</span>}
                      </div>
                      <span style={{fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:8,color:riskColor(d.risk),background:riskBg(d.risk)}}>{d.risk} Risk</span>
                    </div>
                    <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>
                      {[["QC Critical","critical"],["Visible M3","visible"],["Lot Ctrl","lotCtrl"]].map(([label,field]) => (
                        <span key={field} style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:6,color:d[field]==="Yes"?"#065F46":"#991B1B",background:d[field]==="Yes"?"#D1FAE5":"#FEE2E2"}}>{label}: {d[field]}</span>
                      ))}
                    </div>
                    <div style={{fontSize:11,color:"#666",lineHeight:1.5}}>{d.comment}</div>
                  </div>);
                })}
              </div>
              <div style={{marginTop:16,padding:12,background:"#FFF8E1",borderRadius:8,fontSize:12,color:"#666",borderLeft:"4px solid #D97706"}}>
                <strong style={{color:"#92400E"}}>Materials NOT used at Tatui:</strong> {allMats.filter(m => TATUI_DATA[m.id] && TATUI_DATA[m.id].used === "No").map(m => m.cat).join(", ") || "None"}
              </div>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:14}}>
            <div style={{background:"#fff",borderRadius:12,padding:"18px 20px",borderLeft:"4px solid "+NAVY,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
              <div style={{fontSize:10,color:"#888",fontWeight:700,textTransform:"uppercase"}}>Total Materials</div>
              <div style={{fontSize:28,fontWeight:800,color:NAVY}}>{allMats.length}</div>
              <div style={{fontSize:11,color:"#999"}}>{MATERIALS.filter(m=>!m.plantSpecific).length} standard + {allMats.length - MATERIALS.filter(m=>!m.plantSpecific).length} plant-specific</div>
            </div>
            <div style={{background:"#fff",borderRadius:12,padding:"18px 20px",borderLeft:"4px solid "+GREEN,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
              <div style={{fontSize:10,color:"#888",fontWeight:700,textTransform:"uppercase"}}>Plants Responded</div>
              <div style={{fontSize:28,fontWeight:800,color:GREEN}}>{plantsReceived}</div>
              <div style={{fontSize:11,color:"#999"}}>{plantsReceived}/4 plants (excl. GGL)</div>
            </div>
            <div style={{background:"#fff",borderRadius:12,padding:"18px 20px",borderLeft:"4px solid "+RED,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
              <div style={{fontSize:10,color:"#888",fontWeight:700,textTransform:"uppercase"}}>High Risk (Tatui)</div>
              <div style={{fontSize:28,fontWeight:800,color:RED}}>{Object.values(TATUI_DATA).filter(d=>d.risk==="High").length}</div>
              <div style={{fontSize:11,color:"#999"}}>materials marked High risk</div>
            </div>
            <div style={{background:"#fff",borderRadius:12,padding:"18px 20px",borderLeft:"4px solid "+YELLOW,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
              <div style={{fontSize:10,color:"#888",fontWeight:700,textTransform:"uppercase"}}>Lot-Controlled (Tatui)</div>
              <div style={{fontSize:28,fontWeight:800,color:YELLOW}}>{Object.values(TATUI_DATA).filter(d=>d.lotCtrl==="Yes").length}</div>
              <div style={{fontSize:11,color:"#999"}}>materials for M3 lot control</div>
            </div>
          </div>
          </>);
        })()}

        <div style={{textAlign:"center",color:"#AAA",fontSize:11,marginTop:28,padding:"14px 0",borderTop:"1px solid #E2E8F0"}}>
          GlobalCore M3 - Mirror/Wet Coater Quality Launch Program · v{DASHBOARD_VERSION} · Built: {DATA_BUILT}
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
